<!DOCTYPE html>
<html lang="pt-PT" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas Fotográfico de Portugal — Mapa</title>
<link rel="stylesheet" href="vendor/leaflet/leaflet.css">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<a class="skip-link" href="#conteudo">Saltar para o conteúdo</a>

<header class="top-bar">
  <div class="top-bar__inner">
    <a class="brand" href="index.html">
      <span class="brand__icon" aria-hidden="true">📷</span>
      <div class="brand__text">
        <h1>Atlas Fotográfico de Portugal</h1>
        <p>Continente · Açores · Madeira</p>
      </div>
    </a>
    <nav class="main-nav" id="main-nav" aria-label="Navegação principal">
      <a href="index.html">Início</a>
      <a href="mapa.html" class="is-current">Mapa</a>
      <a href="explorar.html">Explorar</a>
      <a href="pessoal.html">Área pessoal</a>
    </nav>
    <div class="top-bar__actions">
      <button id="btn-theme" class="icon-btn" type="button" title="Alternar modo claro/escuro" aria-label="Alternar modo claro/escuro">🌙</button>
      <button id="btn-menu" class="icon-btn hide-desktop" type="button" title="Abrir menu" aria-label="Abrir menu" aria-expanded="false" aria-controls="main-nav">☰</button>
    </div>
  </div>
</header>

<main id="conteudo">
  <section class="toolbar" aria-label="Filtros do mapa">
    <div class="toolbar__row">
      <button id="btn-toggle-filters" class="btn" type="button" aria-expanded="false" aria-controls="filters-panel">Filtros ▾</button>
      <div class="map-jump">
        <span class="map-jump__label">Ir para:</span>
        <button class="btn btn--ghost" type="button" data-region="continente">Continente</button>
        <button class="btn btn--ghost" type="button" data-region="acores">Açores</button>
        <button class="btn btn--ghost" type="button" data-region="madeira">Madeira</button>
      </div>
    </div>
    <div class="filters-panel" id="filters-panel" hidden></div>
  </section>

  <p class="results-count" id="results-count" aria-live="polite"></p>

  <section class="map-wrap">
    <div id="map"></div>
    <div class="map-legend">
      <span><i class="map-legend__dot map-legend__dot--default"></i> Por visitar</span>
      <span><i class="map-legend__dot map-legend__dot--visited"></i> Visitado</span>
      <span><i class="map-legend__dot map-legend__dot--favorite"></i> Favorito</span>
    </div>
  </section>
</main>

<footer class="site-footer">
  <p>Atlas Fotográfico de Portugal — planeador pessoal de saídas fotográficas.</p>
  <p>Mapa © <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">contribuidores OpenStreetMap</a></p>
</footer>

<script src="vendor/leaflet/leaflet.js"></script>
<script src="core.js"></script>
<script src="mapa.js"></script>
</body>
</html>
